
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-dark: #000000;
            --color-purple: #982598;
            --color-pink: #E491C9;
            --color-cream: #F1E9E9;
        }
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--color-dark);
            user-select: none;
            overflow: hidden;
            color: var(--color-dark);
        }
        .bg-custom-dark { background-color: var(--color-dark); }
        .bg-custom-purple { background-color: var(--color-purple); }
        .bg-custom-pink { background-color: var(--color-pink); }
        .bg-custom-cream { background-color: var(--color-cream); }
        .text-custom-dark { color: var(--color-dark); }
        .text-custom-purple { color: var(--color-purple); }
        .border-custom-dark { border-color: var(--color-dark); }
        
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .money-fly {
            animation: moneyFly 1.5s ease-in infinite;
        }
        @keyframes moneyFly {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-100px) rotate(45deg); opacity: 0; }
        }
        .ring-anim {
            animation: ring 0.5s ease-in-out infinite;
        }
        @keyframes ring {
            0% { transform: rotate(0); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0); }
        }
    </style>
